<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bazario — Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #2874f0;
      --primary-dark: #1a5dc8;
      --accent:       #ff6f00;
      --bg:           #f1f3f6;
      --surface:      #ffffff;
      --text:         #212121;
      --text-sec:     #666666;
      --text-muted:   #999999;
      --border:       #e0e0e0;
      --success:      #388e3c;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ─── NAVBAR ─── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--primary);
      height: 56px;
      display: flex; align-items: center;
      padding: 0 16px; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .nav-logo { display: flex; flex-direction: column; min-width: 120px; text-decoration: none; }
    .nav-logo .brand { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; line-height: 1; }
    .nav-logo .brand span { color: #ffe082; }
    .nav-logo .tagline { font-size: 10px; color: rgba(255,255,255,0.75); font-style: italic; margin-top: 2px; }
    .nav-search { flex: 1; display: flex; max-width: 600px; }
    .nav-search input {
      flex: 1; height: 36px; padding: 0 14px;
      border: none; border-radius: 4px 0 0 4px;
      font-size: 14px; outline: none; color: var(--text);
    }
    .nav-search button {
      width: 44px; height: 36px;
      background: var(--accent); border: none;
      border-radius: 0 4px 4px 0;
      color: #fff; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center;
      padding: 6px 14px; color: #fff; border-radius: 4px;
      font-size: 12px; white-space: nowrap;
      cursor: pointer; background: none; border: none; gap: 2px;
      transition: background 0.15s;
    }
    .nav-btn .label { font-size: 11px; color: rgba(255,255,255,0.8); }
    .nav-btn .value { font-size: 13px; font-weight: 600; }
    .nav-btn:hover { background: rgba(255,255,255,0.15); }
    .nav-btn-login {
      background: #fff; color: var(--primary);
      font-weight: 600; font-size: 13px;
      border-radius: 4px; padding: 7px 20px;
      border: none; cursor: pointer;
    }
    .cart-count {
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700;
      border-radius: 50%; width: 16px; height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 2px;
    }

    /* ─── BREADCRUMB ─── */
    .breadcrumb {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .breadcrumb a { color: var(--primary); }
    .breadcrumb span { margin: 0 6px; }

    /* ─── LAYOUT ─── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }

    .page-body {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 12px;
      padding: 12px 0 24px;
      align-items: start;
    }

    /* ─── SIDEBAR ─── */
    .sidebar { display: flex; flex-direction: column; gap: 1px; }

    .filter-block {
      background: var(--surface);
      padding: 16px;
    }

    .filter-block:first-child { border-radius: 4px 4px 0 0; }
    .filter-block:last-child  { border-radius: 0 0 4px 4px; }

    .filter-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .filter-title {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .filter-clear {
      font-size: 12px; color: var(--primary);
      background: none; border: none; cursor: pointer;
      font-family: inherit;
    }

    .filter-option {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; cursor: pointer;
    }

    .filter-option input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: var(--primary); cursor: pointer;
      flex-shrink: 0;
    }

    .filter-option label {
      font-size: 13px; color: var(--text-sec);
      cursor: pointer; line-height: 1.4;
    }

    .filter-option label span {
      color: var(--text-muted); font-size: 11px;
    }

    /* Price range */
    .price-inputs {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .price-inputs-row {
      display: flex;
      gap: 8px;
    }

    .price-inputs input {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      outline: none;
    }

    .price-inputs input:focus { border-color: var(--primary); }

    .price-go {
      padding: 6px 12px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 3px;
      font-size: 12px; font-weight: 600;
    }

    /* ─── MAIN CONTENT ─── */
    .main-content { display: flex; flex-direction: column; gap: 1px; }

    /* Sort/results bar */
    .sort-bar {
      background: var(--surface);
      padding: 12px 16px;
      display: flex; align-items: center;
      justify-content: space-between;
      border-radius: 4px 4px 0 0;
    }

    .results-info {
      font-size: 13px; color: var(--text-sec);
    }

    .results-info strong { color: var(--text); font-weight: 600; }

    .sort-options {
      display: flex; align-items: center; gap: 0;
    }

    .sort-label {
      font-size: 13px; font-weight: 600;
      color: var(--text-muted); margin-right: 12px;
    }

    .sort-btn {
      padding: 8px 16px;
      background: none; border: none;
      font-size: 13px; color: var(--text-sec);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s; font-family: inherit;
    }

    .sort-btn:hover { color: var(--primary); }
    .sort-btn.active { color: var(--primary); font-weight: 600; border-bottom-color: var(--primary); }

    /* Product grid */
    .products-list {
      display: flex; flex-direction: column; gap: 1px;
    }

    .product-row {
      background: var(--surface);
      padding: 20px 16px;
      display: grid;
      grid-template-columns: 200px 1fr auto;
      gap: 20px;
      cursor: pointer;
      transition: box-shadow 0.2s;
      align-items: start;
    }

    .product-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.1); position: relative; z-index: 1; }
    .product-row:last-child { border-radius: 0 0 4px 4px; }

    .prod-image {
      width: 200px; height: 200px;
      background: var(--bg);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .product-row:hover .prod-image { transform: scale(1.03); }

    .prod-info { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

    .prod-name {
      font-size: 15px; font-weight: 500;
      color: var(--text); line-height: 1.4;
    }

    .prod-rating {
      display: flex; align-items: center; gap: 6px;
    }

    .rating-badge {
      background: var(--success); color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 2px 7px; border-radius: 3px;
      display: flex; align-items: center; gap: 2px;
    }

    .rating-count { font-size: 12px; color: var(--text-muted); }

    .prod-highlights { list-style: none; margin-top: 4px; }

    .prod-highlights li {
      font-size: 12px; color: var(--text-sec);
      padding: 2px 0; display: flex; gap: 6px;
    }

    .prod-highlights li::before {
      content: '•'; color: var(--text-muted); flex-shrink: 0;
    }

    .prod-delivery {
      font-size: 12px; color: var(--text-sec);
      margin-top: 4px;
    }

    .prod-delivery strong { color: var(--success); font-weight: 600; }

    .prod-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

    .prod-tag {
      font-size: 11px; padding: 2px 7px;
      border-radius: 2px; font-weight: 500;
    }

    .tag-assured { background: #e3f2fd; color: #1565c0; }
    .tag-bestseller { background: #fff3e0; color: #e65100; }
    .tag-new { background: #e8f5e9; color: #2e7d32; }

    .prod-actions {
      display: flex; flex-direction: column;
      gap: 8px; min-width: 160px; padding-top: 4px;
    }

    .prod-price-block { text-align: right; }

    .prod-price-current {
      font-size: 22px; font-weight: 700; color: var(--text);
    }

    .prod-price-row {
      display: flex; align-items: center;
      gap: 6px; justify-content: flex-end; margin-top: 2px;
    }

    .prod-price-original {
      font-size: 13px; color: var(--text-muted);
      text-decoration: line-through;
    }

    .prod-price-discount { font-size: 13px; color: var(--success); font-weight: 600; }

    .btn-add-cart {
      background: var(--accent); color: #fff;
      border: none; border-radius: 4px;
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      width: 100%; transition: background 0.2s;
      font-family: inherit;
    }

    .btn-add-cart:hover { background: #e65100; }

    .btn-wishlist {
      background: none; color: var(--primary);
      border: 1px solid var(--primary); border-radius: 4px;
      padding: 9px 16px; font-size: 13px; font-weight: 600;
      width: 100%; transition: background 0.15s;
      font-family: inherit;
    }

    .btn-wishlist:hover { background: #e8f0fe; }

    /* ─── PAGINATION ─── */
    .pagination {
      background: var(--surface);
      padding: 16px;
      display: flex; align-items: center;
      justify-content: center; gap: 4px;
      border-radius: 0 0 4px 4px;
      margin-top: 1px;
    }

    .page-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 3px;
      background: none; font-size: 13px; cursor: pointer;
      font-family: inherit; color: var(--text);
      transition: all 0.15s;
    }

    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn.next { width: auto; padding: 0 14px; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323232; color: #fff;
      padding: 12px 24px; border-radius: 4px;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      z-index: 9999; transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .page-body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .product-row { grid-template-columns: 120px 1fr; }
      .prod-actions { display: none; }
      .prod-image { width: 120px; height: 120px; font-size: 44px; }
    }

    .rc-hidden { display: none !important; }

    .prime-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #1a237e, #1565c0);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.03em;
    }
  </style>

  <script>
    (function() {
      try {
        var currentUser = JSON.parse(localStorage.getItem('bazario_user') || 'null');
        if (!currentUser || !currentUser.email) return;
        var wzrkPE = localStorage.getItem('WZRK_PE_' + currentUser.email);
        if (!wzrkPE) return;
        var vars = JSON.parse(decodeURIComponent(wzrkPE));

        // listing_sort_default — applied via global variable before init()
        if (vars['Bazario.Listing.listing_sort_default']) {
          window._rcListingSortDefault = vars['Bazario.Listing.listing_sort_default'];
        }

        // listing_products_per_page
        if (vars['Bazario.Listing.listing_products_per_page']) {
          window._rcListingProductsPerPage = vars['Bazario.Listing.listing_products_per_page'];
        }

        // listing_free_delivery_threshold
        if (vars['Bazario.Listing.listing_free_delivery_threshold']) {
          window._rcListingFreeDeliveryThreshold = vars['Bazario.Listing.listing_free_delivery_threshold'];
        }

        // listing_promo_banner_enabled
        if (vars['Bazario.Listing.listing_promo_banner_enabled'] !== undefined) {
          window._rcListingPromoBannerEnabled = vars['Bazario.Listing.listing_promo_banner_enabled'];
        }

        // listing_promo_text
        if (vars['Bazario.Listing.listing_promo_text']) {
          window._rcListingPromoText = vars['Bazario.Listing.listing_promo_text'];
        }

        // listing_promo_bg_color
        if (vars['Bazario.Listing.listing_promo_bg_color']) {
          window._rcListingPromoBgColor = vars['Bazario.Listing.listing_promo_bg_color'];
        }

        // listing_show_prime_badge
        if (vars['Bazario.Listing.listing_show_prime_badge'] !== undefined) {
          window._rcListingShowPrimeBadge = vars['Bazario.Listing.listing_show_prime_badge'];
        }

      } catch(e) {
        console.warn('RC pre-render check failed:', e);
      }
    })();
  </script>
</head>
<body>

  <!-- ─── NAVBAR ─── -->
  <nav class="navbar">
    <a href="../ecommerce/index.html" class="nav-logo">
      <span class="brand">Bazar<span>io</span></span>
      <span class="tagline">India's Everything Store</span>
    </a>
    <div class="nav-search">
      <input type="text" placeholder="Search for products, brands and more" id="searchInput" />
      <button onclick="handleSearch()">🔍</button>

    <div class="nav-actions">
      <button class="nav-btn-login" onclick="showToast('Opening login...')">Login</button>
      <button class="nav-btn" onclick="window.location.href='wishlist.html'">
        <span class="label">Wishlist</span>
        <span class="value">♡ <span id="wishlistCount">0</span></span>
      </button>
      <button class="nav-btn" onclick="window.location.href='cart.html'">
        <span class="label">Cart</span>
        <span class="value">🛒 <span class="cart-count" id="cartCount">0</span></span>
      </button>
      <button class="nav-btn" onclick="window.location.href='../demo.html'" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;">
        <span class="label">Live</span>
        <span class="value">⚡ Demo</span>
      </button>
    </div>
  </nav>

  <!-- ─── BREADCRUMB ─── -->
  <div class="breadcrumb">
    <div class="container">
      <a href="../ecommerce/index.html">Home</a>
      <span>›</span>
      <span id="breadcrumbCategory">Electronics</span>
    </div>
  </div>

  <!-- ─── MAIN ─── -->
  <main>
    <div class="container">
      <div class="page-body">

        <!-- SIDEBAR -->
        <aside class="sidebar">

          <div class="filter-block">
            <div class="filter-header">
              <span class="filter-title">Filters</span>
              <button class="filter-clear" onclick="clearFilters()">Clear All</button>
            </div>
          </div>

          <!-- Price -->
          <div class="filter-block">
            <div class="filter-header">
              <span class="filter-title">Price</span>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="p1" onchange="handleFilter('price', 'Under ₹500')">
              <label for="p1">Under ₹500</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="p2" onchange="handleFilter('price', '₹500 – ₹1,000')">
              <label for="p2">₹500 – ₹1,000</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="p3" onchange="handleFilter('price', '₹1,000 – ₹5,000')">
              <label for="p3">₹1,000 – ₹5,000</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="p4" onchange="handleFilter('price', '₹5,000 – ₹15,000')">
              <label for="p4">₹5,000 – ₹15,000</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="p5" onchange="handleFilter('price', 'Above ₹15,000')">
              <label for="p5">Above ₹15,000</label>
            </div>
            <div class="price-inputs">
              <div class="price-inputs-row">
                <input type="number" placeholder="Min" id="priceMin" />
                <input type="number" placeholder="Max" id="priceMax" />
              </div>
              <button class="price-go" onclick="handlePriceRange()" style="width:100%;padding:8px;">Go</button>
            </div>
          </div>

          <!-- Brand -->
          <div class="filter-block">
            <div class="filter-header">
              <span class="filter-title">Brand</span>
            </div>
            <div id="brandFilters"></div>
          </div>

          <!-- Rating -->
          <div class="filter-block">
            <div class="filter-header">
              <span class="filter-title">Customer Rating</span>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="r4" onchange="handleFilter('rating', '4★ & above')">
              <label for="r4">4★ & above</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="r3" onchange="handleFilter('rating', '3★ & above')">
              <label for="r3">3★ & above</label>
            </div>
          </div>

          <!-- Discount -->
          <div class="filter-block">
            <div class="filter-header">
              <span class="filter-title">Discount</span>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="d10" onchange="handleFilter('discount', '10% or more')">
              <label for="d10">10% or more</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="d20" onchange="handleFilter('discount', '20% or more')">
              <label for="d20">20% or more</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="d30" onchange="handleFilter('discount', '30% or more')">
              <label for="d30">30% or more</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="d50" onchange="handleFilter('discount', '50% or more')">
              <label for="d50">50% or more</label>
            </div>
          </div>

          <!-- Availability -->
          <div class="filter-block">
            <div class="filter-header">
              <span class="filter-title">Availability</span>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="avail" onchange="handleFilter('availability', 'Exclude Out of Stock')">
              <label for="avail">Exclude Out of Stock</label>
            </div>
          </div>

        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">

          <!-- Sort bar -->
          <div class="sort-bar">
            <div class="results-info">
              Showing results for <strong id="categoryLabel">Electronics</strong>
              — <span id="resultCount">48</span> products
            </div>
            <div class="sort-options">
              <span class="sort-label">Sort by:</span>
              <button class="sort-btn active" onclick="handleSort('relevance', this)">Relevance</button>
              <button class="sort-btn" onclick="handleSort('popularity', this)">Popularity</button>
              <button class="sort-btn" onclick="handleSort('price_low', this)">Price: Low to High</button>
              <button class="sort-btn" onclick="handleSort('price_high', this)">Price: High to Low</button>
              <button class="sort-btn" onclick="handleSort('rating', this)">Rating</button>
            </div>
          </div>

          <!-- Promo banner strip — controlled by RC -->
          <div id="listing-promo-strip" style="display:none;
            border-radius:6px;
            padding:12px 20px;
            margin-bottom:12px;
            align-items:center;
            justify-content:center;
            font-size:13px;
            font-weight:600;
            color:#fff;">
            <span id="listing-promo-text">🎉 Extra 10% off on orders above ₹999 — Use code BAZARIO10</span>
          </div>
          
          <!-- CT Native Display — category-specific offer banner -->
          <div id="ct-native-display-listing" style="margin-bottom:12px;"></div>

          <!-- Products list -->
          <div class="products-list" id="productsList"></div>

          <!-- Pagination -->
          <div class="pagination">
            <button class="page-btn active">1</button>
            <button class="page-btn" onclick="handlePageChange(2)">2</button>
            <button class="page-btn" onclick="handlePageChange(3)">3</button>
            <button class="page-btn" onclick="handlePageChange(4)">4</button>
            <button class="page-btn" onclick="handlePageChange(5)">5</button>
            <button class="page-btn next" onclick="handlePageChange('next')">Next ›</button>
          </div>

        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/catalogue.js"></script>
  <script src="js/clevertap.js"></script>
  <script src="js/auth.js"></script>
  <script>

    // ─── PRODUCT CATALOGUE ───
    // Each category has its own set of products.
    // When we integrate CleverTap, clicking a product fires "Product Viewed"
    // with all these properties as event properties.

    // ─── STATE ───
    let currentCategory = 'Electronics';

    function getCartKey() {
      const user = JSON.parse(localStorage.getItem('bazario_user') || 'null');
      return user ? `bazario_cart_${user.email}` : 'bazario_cart_guest';
    }

    let cartItems = JSON.parse(localStorage.getItem(getCartKey()) || '[]');
    let currentSearch = ''; // empty means no search active

    // ─── FILTER & PAGINATION STATE ───
    const PAGE_SIZE = window._rcListingProductsPerPage || 8;
    let currentPage  = 1;
    let currentSort  = window._rcListingSortDefault || 'relevance';
    const FREE_DELIVERY_THRESHOLD = window._rcListingFreeDeliveryThreshold || 499;
    let activeFilters = {
      price:    [],   // e.g. ['Under ₹500', '₹500 – ₹1,000']
      brands:   [],   // e.g. ['Samsung', 'Apple']
      rating:   null, // e.g. 4 (means 4★ and above)
      discount: null, // e.g. 30 (means 30% or more)
      priceMin: null,
      priceMax: null
};

    // ─── INIT ───
    let initialised = false;

    function init() {
      if (initialised) return;
      initialised = true;

      const params = new URLSearchParams(window.location.search);

      // ── Detect mode: Search, Deals, or Category ──
      const searchParam = params.get('search');
      if (searchParam) {
        currentSearch   = searchParam.trim();
        currentCategory = 'Search';
      } else if (params.get('category') === 'Deals') {
        currentCategory = 'Deals';
      } else if (params.get('category') && catalogue[params.get('category')]) {
        currentCategory = params.get('category');
      }

      // ── Display name ──
      let displayName;
      if (currentCategory === 'Deals')        displayName = "Today's Deals 🔥";
      else if (currentCategory === 'Search')  displayName = `Results for "${currentSearch}"`;
      else                                     displayName = currentCategory;

      document.title = `Bazario — ${displayName}`;
      document.getElementById('breadcrumbCategory').textContent = displayName;
      document.getElementById('categoryLabel').textContent      = displayName;

      // ── Pre-fill search bar if in search mode ──
      if (currentSearch) {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = currentSearch;
      }

      renderBrandFilters(currentCategory);
      applyFiltersAndSort();
      updateCartCount();

      // ── Calculate total products for CT ──
      let totalProducts;
      if (currentCategory === 'Search') {
        const q = currentSearch.toLowerCase();
        totalProducts = getAllProducts().filter(p =>
          p.name.toLowerCase().includes(q)     ||
          p.brand.toLowerCase().includes(q)    ||
          p.category.toLowerCase().includes(q) ||
          (p.highlights || []).some(h => h.toLowerCase().includes(q))
        ).length;
      } else if (currentCategory === 'Deals') {
        totalProducts = getAllProducts().filter(p => p.discount >= 30).length;
      } else {
        totalProducts = (catalogue[currentCategory] || []).length;
      }

      // ── Read navigation source from URL ──
      const source   = params.get('source')   || 'direct';
      const banner   = params.get('banner')   || '';
      const position = params.get('position') || '';

      // ── CT: Category Viewed — always fires on listing page load ──
      ctEvent("Category Viewed", {
        category_name:  currentCategory,
        source:         currentCategory === 'Search' ? 'search' : source,
        total_products: totalProducts
      });

      // ── Store last viewed category for Native Display on homepage ──
      localStorage.setItem('bz_last_category_viewed', currentCategory);
      localStorage.setItem('bz_last_category_url', window.location.href);

      // ── CT: Category Clicked — fires if user came from homepage navigation ──
      if (source === 'home_category_grid' || source === 'home_subnav') {
        ctEvent("Category Clicked", {
          category_name: currentCategory,
          source:        source
        });
      }

      // ── CT: Banner Clicked — fires if user came from a hero banner ──
      if (source === 'hero_banner' && banner) {
        ctEvent("Banner Clicked", {
          banner_name:     banner,
          banner_position: position,
          destination:     currentCategory
        });
      }

      // ── CT: Product Searched — fires if user searched from homepage ──
      if (source === 'homepage' && currentCategory === 'Search') {
        ctEvent("Product Searched", {
          query:         currentSearch,
          results_count: totalProducts,
          source:        "homepage"
        });
      }

      // ── Apply RC sort button active state ──
      if (window._rcListingSortDefault) {
        document.querySelectorAll('.sort-btn').forEach(function(btn) {
          btn.classList.remove('active');
        });
        var activeBtn = document.querySelector(
          `.sort-btn[onclick*="'${window._rcListingSortDefault}'"]`
        );
        if (activeBtn) activeBtn.classList.add('active');
      }

      // ── Apply RC promo strip ──
      var promoStrip = document.getElementById('listing-promo-strip');
      if (promoStrip) {
        var promoBannerEnabled = window._rcListingPromoBannerEnabled !== undefined
          ? window._rcListingPromoBannerEnabled : true;
        var promoBgColor = window._rcListingPromoBgColor || '#1565c0';
        var promoText = window._rcListingPromoText ||
          '🎉 Extra 10% off on orders above ₹999 — Use code BAZARIO10';

        if (promoBannerEnabled) {
          promoStrip.style.display = 'flex';
          promoStrip.style.background = promoBgColor;
          document.getElementById('listing-promo-text').textContent = promoText;

          // CT Event — Promo Banner Viewed
          ctEvent("Promo Banner Viewed", {
            page:       "listing",
            category:   currentCategory,
            promo_text: promoText,
            vertical:   "bazario"
          });

        } else {
          promoStrip.style.display = 'none';
        }
      }
    }

    // ─── APPLY FILTERS, SORT, AND PAGINATE ───
    // This runs every time a filter, sort, or page changes.
    // It always starts from the full category array.
    function applyFiltersAndSort() {
      // Deals mode — pulls all products with 30%+ discount across all categories
      let products;
      if (currentCategory === 'Search') {
        const q = currentSearch.toLowerCase();
        products = getAllProducts().filter(p =>
          p.name.toLowerCase().includes(q)     ||
          p.brand.toLowerCase().includes(q)    ||
          p.category.toLowerCase().includes(q) ||
          (p.highlights || []).some(h => h.toLowerCase().includes(q))
        );
      } else if (currentCategory === 'Deals') {
        products = getAllProducts()
          .filter(p => p.discount >= 30)
          .sort((a, b) => b.discount - a.discount);
      } else {
        products = catalogue[currentCategory] || [];
      }
      
      // ── Price range filter (checkbox bands) ──
      if (activeFilters.price.length > 0) {
        products = products.filter(p => {
          return activeFilters.price.some(band => {
            if (band === 'Under ₹500')          return p.price < 500;
            if (band === '₹500 – ₹1,000')       return p.price >= 500  && p.price < 1000;
            if (band === '₹1,000 – ₹5,000')     return p.price >= 1000 && p.price < 5000;
            if (band === '₹5,000 – ₹15,000')    return p.price >= 5000 && p.price < 15000;
            if (band === 'Above ₹15,000')        return p.price >= 15000;
            return false;
          });
        });
      }

      // ── Custom price range (Min/Max inputs) ──
      if (activeFilters.priceMin !== null) {
        products = products.filter(p => p.price >= activeFilters.priceMin);
      }
      if (activeFilters.priceMax !== null) {
        products = products.filter(p => p.price <= activeFilters.priceMax);
      }

      // ── Brand filter ──
      if (activeFilters.brands.length > 0) {
        products = products.filter(p => activeFilters.brands.includes(p.brand));
      }

      // ── Rating filter ──
      if (activeFilters.rating !== null) {
        products = products.filter(p => p.rating >= activeFilters.rating);
      }

      // ── Discount filter ──
      if (activeFilters.discount !== null) {
        products = products.filter(p => p.discount >= activeFilters.discount);
      }

      // ── Sort ──
      switch (currentSort) {
        case 'price_low':   products.sort((a, b) => a.price - b.price);            break;
        case 'price_high':  products.sort((a, b) => b.price - a.price);            break;
        case 'rating':      products.sort((a, b) => b.rating - a.rating);          break;
        case 'popularity':  products.sort((a, b) => b.reviews - a.reviews);        break;
        case 'discount':    products.sort((a, b) => b.discount - a.discount);      break;
        default:            break; // relevance — original catalogue order
      }

      // ── Update result count ──
      const totalResults = products.length;
      document.getElementById('resultCount').textContent = totalResults;

      // ── Paginate ──
      const totalPages  = Math.max(1, Math.ceil(totalResults / PAGE_SIZE));
      currentPage       = Math.min(currentPage, totalPages); // clamp if filters reduced pages
      const start       = (currentPage - 1) * PAGE_SIZE;
      const pageSlice   = products.slice(start, start + PAGE_SIZE);

      // ── Render ──
      renderProductRows(pageSlice);
      renderPagination(totalPages);
    }

    // ─── RENDER PRODUCT ROWS ───
    // Receives an already-filtered, sorted, paginated array.
    function renderProductRows(products) {
      const list = document.getElementById('productsList');
      list.innerHTML = '';

      if (products.length === 0) {
        list.innerHTML = `
          <div style="background:#fff;padding:40px;text-align:center;color:#999;border-radius:0 0 4px 4px">
            <div style="font-size:40px;margin-bottom:12px">🔍</div>
            <div style="font-size:16px;font-weight:600;color:#212121;margin-bottom:8px">No products found</div>
            <div style="font-size:13px">Try adjusting your filters or <button onclick="clearFilters()"
              style="background:none;border:none;color:#2874f0;font-weight:600;cursor:pointer;font-size:13px">
              clear all filters</button></div>
          </div>`;
        return;
      }

      products.forEach(p => {
        const tagHTML = p.tags.map(t => `<span class="prod-tag tag-${t}">${t === 'assured' ? '✓ Bazario Assured' : t === 'bestseller' ? '🏆 Bestseller' : '🆕 New'}</span>`).join('');
        const primeBadgeHTML = window._rcListingShowPrimeBadge !== false 
          ? '<span class="prime-badge">⚡ Prime</span>' 
          : '';
        const highlightHTML = p.highlights.map(h => `<li>${h}</li>`).join('');

        const row = document.createElement('div');
        row.className = 'product-row';
        row.innerHTML = `
          <div class="prod-image">${p.emoji}</div>
          <div class="prod-info">
            <div class="prod-name">${p.name}</div>
            <div class="prod-rating">
              <span class="rating-badge">${p.rating} ★</span>
              <span class="rating-count">(${p.reviews.toLocaleString('en-IN')})</span>
            </div>
            <ul class="prod-highlights">${highlightHTML}</ul>
            <div class="prod-tags">${tagHTML}${primeBadgeHTML}</div>
            <div class="prod-delivery">Delivery by <strong>${p.price >= FREE_DELIVERY_THRESHOLD ? 'Tomorrow, Free' : 'Tomorrow, ₹40'}</strong> with Bazario Prime</div>
          </div>
          <div class="prod-actions">
            <div class="prod-price-block">
              <div class="prod-price-current">₹${p.price.toLocaleString('en-IN')}</div>
              <div class="prod-price-row">
                <span class="prod-price-original">₹${p.originalPrice.toLocaleString('en-IN')}</span>
                <span class="prod-price-discount">${p.discount}% off</span>
              </div>
            </div>
            <button class="btn-add-cart" onclick="handleAddToCart(event, '${p.id}')">Add to Cart</button>
            <button class="btn-wishlist" onclick="handleWishlist(event, '${p.name}')">♡ Wishlist</button>
          </div>
        `;
        row.addEventListener('click', () => handleProductClick(p));
        list.appendChild(row);
      });
    }

    // ─── BRAND FILTERS ───
    function renderBrandFilters(category) {
      let products;
      if (category === 'Search') {
        const q = currentSearch.toLowerCase();
        products = getAllProducts().filter(p =>
          p.name.toLowerCase().includes(q)  ||
          p.brand.toLowerCase().includes(q) ||
          p.category.toLowerCase().includes(q)
        );
      } else if (category === 'Deals') {
        products = getAllProducts().filter(p => p.discount >= 30);
      } else {
        products = catalogue[category] || [];
      }
      const brands    = [...new Set(products.map(p => p.brand))];
      const container = document.getElementById('brandFilters');
      container.innerHTML = brands.map((b, i) => `
        <div class="filter-option">
          <input type="checkbox" id="brand${i}" onchange="handleFilter('brand', '${b}')">
          <label for="brand${i}">${b}</label>
        </div>
      `).join('');
    }

    // ─── PRODUCT CLICK → goes to product.html ───
    function handleProductClick(product) {
      const params = new URLSearchParams({
        id:              product.id,
        name:            product.name,
        category:        product.category,
        price:           product.price,
        original:        product.originalPrice,
        discount:        product.discount,
        brand:           product.brand,
        rating:          product.rating,
        reviews:         product.reviews,
        emoji:           product.emoji,
        highlights:      product.highlights.join('|'),
        tags:            product.tags.join(','),
        source:          'listing_page',
        has_prime_badge: window._rcListingShowPrimeBadge !== false ? 'true' : 'false'
      });
      window.location.href = `product.html?${params.toString()}`;
    }

    // ─── ADD TO CART (from listing) ───
    function handleAddToCart(e, productId) {
      e.stopPropagation();
      const product = Object.values(catalogue).flat().find(p => p.id === productId);
      if (!product) return;

      const existing = cartItems.find(i => i.id === productId);
      if (existing) {
        existing.qty++;
      } else {
        cartItems.push({ ...product, qty: 1 });
      }
      localStorage.setItem(getCartKey(), JSON.stringify(cartItems));
      updateCartCount();

      ctEvent("Added to Cart", {
        product_id:   product.id,
        product_name: product.name,
        category:     product.category,
        brand:        product.brand,
        price:        product.price,
        quantity:     1,
        cart_value:   cartItems.reduce((s, i) => s + i.price * i.qty, 0),
        source:       "listing_page"
      });

      showToast(`✓ ${product.name.substring(0, 30)}... added to cart`);
    }

    function handleWishlist(e, productId) {
      e.stopPropagation();
      const p        = getAllProducts().find(item => item.name === productId) || getAllProducts().find(item => item.id === productId);
      if (!p) { showToast('♡ Added to Wishlist'); return; }

      const wishlist = JSON.parse(localStorage.getItem(getWishlistKey()) || '[]');
      const exists   = wishlist.find(i => i.id === p.id);

      if (exists) { showToast('Already in your Wishlist'); return; }

      wishlist.push({
        id: p.id, name: p.name, brand: p.brand, category: p.category,
        price: p.price, originalPrice: p.originalPrice, discount: p.discount,
        rating: p.rating, emoji: p.emoji, addedAt: new Date().toISOString()
      });

      localStorage.setItem(getWishlistKey(), JSON.stringify(wishlist));

      ctEvent("Added to Wishlist", {
        product_id:   p.id,
        product_name: p.name,
        category:     p.category,
        brand:        p.brand,
        price:        p.price,
        source:       "listing_page"
      });

      showToast(`♡ ${p.name.substring(0, 30)}... added to Wishlist`);

      const el = document.getElementById('wishlistCount');
      if (el) el.textContent = wishlist.length;
    }

    function getWishlistKey() {
      const user = JSON.parse(localStorage.getItem('bazario_user') || 'null');
      return user ? `bazario_wishlist_${user.email}` : 'bazario_wishlist_guest';
    }

    // ─── FILTERS ───
    function handleFilter(type, value) {
      currentPage = 1; // reset to page 1 on any filter change

      if (type === 'price') {
        const idx = activeFilters.price.indexOf(value);
        if (idx > -1) activeFilters.price.splice(idx, 1);
        else activeFilters.price.push(value);
      }

      if (type === 'brand') {
        const idx = activeFilters.brands.indexOf(value);
        if (idx > -1) activeFilters.brands.splice(idx, 1);
        else activeFilters.brands.push(value);
      }

      if (type === 'rating') {
        const num = parseInt(value);
        activeFilters.rating = activeFilters.rating === num ? null : num;
      }

      if (type === 'discount') {
        const num = parseInt(value);
        activeFilters.discount = activeFilters.discount === num ? null : num;
      }

      ctEvent("Filter Applied", {
        filter_type:  type,
        filter_value: value,
        category:     currentCategory
      });

      applyFiltersAndSort();
    }

    function handlePriceRange() {
      const min = parseInt(document.getElementById('priceMin').value) || null;
      const max = parseInt(document.getElementById('priceMax').value) || null;
      if (!min && !max) return;

      activeFilters.priceMin = min;
      activeFilters.priceMax = max;
      currentPage = 1;
      applyFiltersAndSort();
    }

    function clearFilters() {
      activeFilters = { price: [], brands: [], rating: null, discount: null, priceMin: null, priceMax: null };
      currentPage   = 1;
      document.querySelectorAll('.filter-option input').forEach(cb => cb.checked = false);
      document.getElementById('priceMin').value = '';
      document.getElementById('priceMax').value = '';
      applyFiltersAndSort();
      showToast('All filters cleared');
    }

    // ─── SORT ───
    function handleSort(type, btn) {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = type;
      currentPage = 1;
      applyFiltersAndSort();

      ctEvent("Sort Applied", {
        sort_type: type,
        category:  currentCategory
      });
    }

    // ─── SEARCH ───
    function handleSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;

      currentSearch   = q;
      currentCategory = 'Search';
      currentPage     = 1;

      const url = new URL(window.location.href);
      url.searchParams.set('search', q);
      url.searchParams.delete('category');
      window.history.pushState({}, '', url);

      const displayName = `Results for "${q}"`;
      document.getElementById('breadcrumbCategory').textContent = displayName;
      document.getElementById('categoryLabel').textContent      = displayName;
      document.title = `Bazario — ${displayName}`;

      ctEvent("Product Searched", {
        query:         q,
        results_count: getAllProducts().filter(p =>
          p.name.toLowerCase().includes(q.toLowerCase()) ||
          p.brand.toLowerCase().includes(q.toLowerCase()) ||
          p.category.toLowerCase().includes(q.toLowerCase())
        ).length,
        source: "listing_search_bar"
      });

      renderBrandFilters('Search');
      applyFiltersAndSort();
    }

    // ─── RENDER PAGINATION BAR ───
    function renderPagination(totalPages) {
      const container = document.querySelector('.pagination');
      if (!container) return;

      if (totalPages <= 1) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'flex';
      container.innerHTML = '';

      // Previous button
      if (currentPage > 1) {
        const prev = document.createElement('button');
        prev.className = 'page-btn';
        prev.textContent = '‹ Prev';
        prev.onclick = () => goToPage(currentPage - 1);
        container.appendChild(prev);
      }

      // Page number buttons
      for (let i = 1; i <= totalPages; i++) {
        // Show first, last, current, and neighbours — add ellipsis for large ranges
        if (
          i === 1 || i === totalPages ||
          (i >= currentPage - 1 && i <= currentPage + 1)
        ) {
          const btn = document.createElement('button');
          btn.className = `page-btn${i === currentPage ? ' active' : ''}`;
          btn.textContent = i;
          btn.onclick = () => goToPage(i);
          container.appendChild(btn);
        } else if (
          i === currentPage - 2 || i === currentPage + 2
        ) {
          const ellipsis = document.createElement('span');
          ellipsis.textContent = '...';
          ellipsis.style.cssText = 'padding:0 6px;color:#999;align-self:center;font-size:13px';
          container.appendChild(ellipsis);
        }
      }

      // Next button
      if (currentPage < totalPages) {
        const next = document.createElement('button');
        next.className = 'page-btn next';
        next.textContent = 'Next ›';
        next.onclick = () => goToPage(currentPage + 1);
        container.appendChild(next);
      }
    }

    // ─── GO TO PAGE ───
    function goToPage(page) {
      currentPage = page;
      applyFiltersAndSort();
      window.scrollTo({ top: 0, behavior: 'smooth' });

      ctEvent("Listing Page Changed", {
        category:    currentCategory,
        page_number: page
      });
    }

    // ─── CART COUNT ───
    function updateCartCount() {
      const total = cartItems.reduce((s, i) => s + i.qty, 0);
      document.getElementById('cartCount').textContent = total;
    }

    // ─── TOAST ───
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

        subtext:      'Cricket, football, sportswear & fitness gear',
        badge:        'Up to 40% OFF',
        ctaText:      'Shop Now →',
        ctaUrl:       'listing.html?category=Sports&source=native_display_listing'
      },
      books_listing: {
        campaignName: '[Bazario] ND — Books Listing',
        category:     'Books',
        gradient:     'linear-gradient(135deg, #bf360c, #d84315)',
        headline:     'Books You\'ll Love',
        subtext:      'Fiction, non-fiction, academic & children\'s books',
        badge:        'Up to 30% OFF',
        ctaText:      'Shop Now →',
        ctaUrl:       'listing.html?category=Books&source=native_display_listing'
      }
    };

    function renderNDListingBanner(data, config) {
      var ndDiv = document.getElementById('ct-native-display-listing');
      if (!ndDiv) return;

      ndDiv.innerHTML = `
        <div id="bz-nd-listing-banner" style="
          background:${config.gradient};
          border-radius:8px;padding:20px 28px;
          display:flex;align-items:center;justify-content:space-between;
          cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.12);
          font-family:'Inter',sans-serif;position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;right:0;bottom:0;left:0;
            background:rgba(255,255,255,0.03);pointer-events:none;"></div>
          <div style="z-index:1;">
            <div style="display:inline-block;background:rgba(255,255,255,0.2);
              color:#fff;font-size:11px;font-weight:700;letter-spacing:0.08em;
              text-transform:uppercase;padding:3px 10px;border-radius:20px;
              margin-bottom:10px;">
              ${config.badge}
            </div>
            <div style="font-size:20px;font-weight:800;color:#fff;margin-bottom:4px;">
              ${config.headline}
            </div>
            <div style="font-size:13px;color:rgba(255,255,255,0.85);">
              ${config.subtext}
            </div>
          </div>
          <div style="z-index:1;flex-shrink:0;margin-left:24px;">
            <div style="background:#ff6f00;color:#fff;font-size:13px;font-weight:700;
              padding:10px 24px;border-radius:6px;white-space:nowrap;">
              ${config.ctaText}
            </div>
          </div>
        </div>`;

      if (typeof clevertap.renderNotificationViewed === 'function') {
        clevertap.renderNotificationViewed(data);
      }

      var banner = document.getElementById('bz-nd-listing-banner');
      if (banner) {
        banner.addEventListener('click', function() {
          if (typeof clevertap.renderNotificationClicked === 'function') {
            clevertap.renderNotificationClicked(data);
          }
          handleNativeDisplayClick(config.campaignName, config.category, config.ctaUrl);
        });
      }
    }

    document.addEventListener("CT_web_native_display", function(event) {
      var data   = event.detail;
      if (!data || !data.kv) return;
      var topic  = data.kv.topic;
      var config = ND_LISTING_CONFIGS[topic];
      if (config) {
        renderNDListingBanner(data, config);
      }
    });
    
    // ─── SEARCH on Enter ───
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });

    // ─── RUN ───
    init();
  </script>
</body>
</html>

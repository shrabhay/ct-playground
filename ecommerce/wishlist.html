<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bazario — My Wishlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #2874f0;
      --primary-dark: #1a5dc8;
      --accent:       #ff6f00;
      --bg:           #f1f3f6;
      --surface:      #ffffff;
      --text:         #212121;
      --text-sec:     #666666;
      --text-muted:   #999999;
      --border:       #e0e0e0;
      --success:      #388e3c;
      --danger:       #d32f2f;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ─── NAVBAR ─── */
    .navbar { position: sticky; top: 0; z-index: 100; background: var(--primary); height: 56px; display: flex; align-items: center; padding: 0 16px; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .nav-logo { display: flex; flex-direction: column; min-width: 120px; text-decoration: none; }
    .nav-logo .brand { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; line-height: 1; }
    .nav-logo .brand span { color: #ffe082; }
    .nav-logo .tagline { font-size: 10px; color: rgba(255,255,255,0.75); font-style: italic; margin-top: 2px; }
    .nav-search { flex: 1; display: flex; max-width: 600px; }
    .nav-search input { flex: 1; height: 36px; padding: 0 14px; border: none; border-radius: 4px 0 0 4px; font-size: 14px; outline: none; color: var(--text); }
    .nav-search button { width: 44px; height: 36px; background: var(--accent); border: none; border-radius: 0 4px 4px 0; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .nav-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; padding: 6px 14px; color: #fff; border-radius: 4px; font-size: 12px; white-space: nowrap; cursor: pointer; background: none; border: none; gap: 2px; transition: background 0.15s; }
    .nav-btn .label { font-size: 11px; color: rgba(255,255,255,0.8); }
    .nav-btn .value { font-size: 13px; font-weight: 600; }
    .nav-btn:hover { background: rgba(255,255,255,0.15); }
    .nav-btn-login { background: #fff; color: var(--primary); font-weight: 600; font-size: 13px; border-radius: 4px; padding: 7px 20px; border: none; cursor: pointer; }
    .cart-count { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; margin-left: 2px; }

    /* ─── BREADCRUMB ─── */
    .breadcrumb { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; font-size: 12px; color: var(--text-muted); }
    .breadcrumb a { color: var(--primary); }
    .breadcrumb span { margin: 0 6px; }

    /* ─── LAYOUT ─── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
    .page-body { padding: 16px 0 40px; }

    /* ─── PAGE HEADER ─── */
    .page-header {
      background: var(--surface);
      border-radius: 4px 4px 0 0;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wishlist-count-badge {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .header-actions { display: flex; gap: 10px; }

    .btn-clear-all {
      padding: 7px 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      color: var(--danger);
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn-clear-all:hover { background: #fdecea; border-color: var(--danger); }

    .btn-add-all-cart {
      padding: 7px 16px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      color: #fff;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-add-all-cart:hover { background: #e65100; }

    /* ─── SORT BAR ─── */
    .sort-bar {
      background: var(--surface);
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .sort-bar span { font-weight: 600; }

    .sort-chip {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: none;
      font-size: 12px;
      color: var(--text-sec);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .sort-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .sort-chip:hover  { border-color: var(--primary); color: var(--primary); }

    /* ─── WISHLIST GRID ─── */
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 0 0 4px 4px;
      overflow: hidden;
    }

    .wish-card {
      background: var(--surface);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      transition: box-shadow 0.2s;
    }

    .wish-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 1; }

    /* Remove button */
    .wish-remove {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }

    .wish-remove:hover { background: #fdecea; border-color: var(--danger); color: var(--danger); }

    .wish-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .wish-card:hover .wish-img { transform: scale(1.04); }

    .wish-discount-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .wish-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }

    .wish-name:hover { color: var(--primary); }

    .wish-brand { font-size: 11px; color: var(--text-muted); }

    .wish-rating {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rating-badge { background: var(--success); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 2px; }

    .wish-price {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .price-current { font-size: 15px; font-weight: 700; color: var(--text); }
    .price-original { font-size: 11px; color: var(--text-muted); text-decoration: line-through; }
    .price-discount { font-size: 11px; color: var(--success); font-weight: 600; }

    .wish-actions { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }

    .btn-move-cart {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.15s;
    }

    .btn-move-cart:hover { background: #e65100; }

    .btn-view-product {
      width: 100%;
      padding: 8px;
      background: none;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-view-product:hover { background: #e8f0fe; }

    .wish-added-date { font-size: 10px; color: var(--text-muted); text-align: center; }

    /* ─── EMPTY STATE ─── */
    .empty-wishlist {
      background: var(--surface);
      border-radius: 0 0 4px 4px;
      padding: 64px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .empty-icon { font-size: 64px; opacity: 0.3; }
    .empty-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .empty-sub { font-size: 14px; color: var(--text-muted); max-width: 340px; line-height: 1.6; }

    .btn-start-shopping {
      padding: 12px 32px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .btn-start-shopping:hover { background: var(--primary-dark); }

    /* ─── RECENTLY VIEWED ─── */
    .suggestions {
      background: var(--surface);
      border-radius: 4px;
      padding: 20px 24px;
      margin-top: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .suggestions-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .suggestion-card {
      background: var(--surface);
      padding: 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow 0.15s;
    }

    .suggestion-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.1); z-index: 1; }

    .sugg-img { width: 100%; aspect-ratio: 1; background: var(--bg); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .sugg-name { font-size: 12px; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sugg-price { font-size: 13px; font-weight: 700; }
    .sugg-discount { font-size: 11px; color: var(--success); font-weight: 600; }

    /* ─── TOAST ─── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #323232; color: #fff; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 9999; transition: transform 0.3s ease; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .wishlist-grid { grid-template-columns: repeat(3, 1fr); }
      .suggestions-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 600px) {
      .wishlist-grid { grid-template-columns: repeat(2, 1fr); }
      .suggestions-grid { grid-template-columns: repeat(2, 1fr); }
      .page-header { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- ─── NAVBAR ─── -->
  <nav class="navbar">
    <a href="../ecommerce/index.html" class="nav-logo">
      <span class="brand">Bazar<span>io</span></span>
      <span class="tagline">India's Everything Store</span>
    </a>
    <div class="nav-search">
      <input type="text" placeholder="Search for products, brands and more" id="searchInput" />
      <button onclick="handleSearch()">🔍</button>
    </div>
    <div class="nav-actions">
      <button class="nav-btn-login" onclick="window.location.href='account.html'">My Account</button>
      <button class="nav-btn" onclick="window.location.href='cart.html'">
        <span class="label">Cart</span>
        <span class="value">🛒 <span class="cart-count" id="cartCount">0</span></span>
      </button>
    </div>
  </nav>

  <!-- ─── BREADCRUMB ─── -->
  <div class="breadcrumb">
    <div class="container">
      <a href="../ecommerce/index.html">Home</a>
      <span>›</span>
      <span>My Wishlist</span>
    </div>
  </div>

  <!-- ─── MAIN ─── -->
  <main>
    <div class="container">
      <div class="page-body">

        <!-- Page header -->
        <div class="page-header">
          <div class="page-title">
            ♡ My Wishlist
            <span class="wishlist-count-badge" id="wishlistCountBadge">(0 items)</span>
          </div>
          <div class="header-actions" id="headerActions" style="display:none">
            <button class="btn-clear-all" onclick="clearWishlist()">Remove All</button>
            <button class="btn-add-all-cart" onclick="addAllToCart()">Add All to Cart</button>
          </div>
        </div>

        <!-- Sort bar -->
        <div class="sort-bar" id="sortBar" style="display:none">
          Sort by:
          <button class="sort-chip active" onclick="sortWishlist('recent', this)">Recently Added</button>
          <button class="sort-chip" onclick="sortWishlist('price_low', this)">Price: Low to High</button>
          <button class="sort-chip" onclick="sortWishlist('price_high', this)">Price: High to Low</button>
          <button class="sort-chip" onclick="sortWishlist('discount', this)">Biggest Discount</button>
        </div>

        <!-- Wishlist grid / empty state -->
        <div id="wishlistContainer"></div>

        <!-- Suggestions -->
        <div class="suggestions" id="suggestionsSection" style="display:none">
          <div class="suggestions-title">You Might Also Like</div>
          <div class="suggestions-grid" id="suggestionsGrid"></div>
        </div>

      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/catalogue.js"></script>
  <script src="js/auth.js"></script>
  <script>

    // ─── STATE ───
    let wishlist    = JSON.parse(localStorage.getItem('bazario_wishlist') || '[]');
    let cartItems   = JSON.parse(localStorage.getItem('bazario_cart')     || '[]');
    let currentSort = 'recent';

    // ─── INIT ───
    function init() {
      updateCartCount();
      render();
      renderSuggestions();

      // ─────────────────────────────────────────────────────────────
      // Later: CleverTap event — "Wishlist Viewed"
      // clevertap.event.push("Wishlist Viewed", {
      //   item_count: wishlist.length
      // });
      // ─────────────────────────────────────────────────────────────
    }

    // ─── RENDER ───
    function render() {
      const container = document.getElementById('wishlistContainer');
      const badge     = document.getElementById('wishlistCountBadge');
      const actions   = document.getElementById('headerActions');
      const sortBar   = document.getElementById('sortBar');

      badge.textContent = `(${wishlist.length} item${wishlist.length !== 1 ? 's' : ''})`;

      if (wishlist.length === 0) {
        actions.style.display  = 'none';
        sortBar.style.display  = 'none';
        container.innerHTML    = `
          <div class="empty-wishlist">
            <div class="empty-icon">♡</div>
            <div class="empty-title">Your wishlist is empty</div>
            <div class="empty-sub">Save items you love by clicking the ♡ button on any product page.</div>
            <button class="btn-start-shopping" onclick="window.location.href='index.html'">Start Shopping</button>
          </div>`;
        document.getElementById('suggestionsSection').style.display = 'block';
        return;
      }

      actions.style.display = 'flex';
      sortBar.style.display = 'flex';

      // Sort
      let sorted = [...wishlist];
      if (currentSort === 'price_low')  sorted.sort((a, b) => a.price - b.price);
      if (currentSort === 'price_high') sorted.sort((a, b) => b.price - a.price);
      if (currentSort === 'discount')   sorted.sort((a, b) => b.discount - a.discount);
      if (currentSort === 'recent')     sorted.sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));

      const grid = document.createElement('div');
      grid.className = 'wishlist-grid';

      sorted.forEach(item => {
        const addedDate = new Date(item.addedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        const card = document.createElement('div');
        card.className = 'wish-card';
        card.innerHTML = `
          <button class="wish-remove" onclick="removeFromWishlist('${item.id}')" title="Remove">✕</button>
          <div class="wish-discount-badge">${item.discount}% off</div>
          <div class="wish-img" onclick="goToProduct('${item.id}', '${encodeURIComponent(item.category)}')">${item.emoji}</div>
          <div class="wish-name" onclick="goToProduct('${item.id}', '${encodeURIComponent(item.category)}')">${item.name}</div>
          <div class="wish-brand">${item.brand}</div>
          <div class="wish-rating">
            <span class="rating-badge">${item.rating} ★</span>
          </div>
          <div class="wish-price">
            <span class="price-current">₹${item.price.toLocaleString('en-IN')}</span>
            <span class="price-original">₹${item.originalPrice.toLocaleString('en-IN')}</span>
            <span class="price-discount">${item.discount}% off</span>
          </div>
          <div class="wish-actions">
            <button class="btn-move-cart" onclick="moveToCart('${item.id}')">🛒 Move to Cart</button>
            <button class="btn-view-product" onclick="goToProduct('${item.id}', '${encodeURIComponent(item.category)}')">View Product</button>
          </div>
          <div class="wish-added-date">Added on ${addedDate}</div>
        `;
        grid.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(grid);
    }

    // ─── RENDER SUGGESTIONS ───
    // Shows a few popular products the user hasn't wishlisted yet
    function renderSuggestions() {
      const wishlistIds  = wishlist.map(i => i.id);
      const suggestions  = getAllProducts()
        .filter(p => !wishlistIds.includes(p.id) && p.tags.includes('bestseller'))
        .slice(0, 5);

      if (suggestions.length === 0) return;

      document.getElementById('suggestionsSection').style.display = 'block';
      const grid = document.getElementById('suggestionsGrid');
      grid.innerHTML = suggestions.map(p => `
        <div class="suggestion-card" onclick="goToProduct('${p.id}', '${encodeURIComponent(p.category)}')">
          <div class="sugg-img">${p.emoji}</div>
          <div class="sugg-name">${p.name}</div>
          <div class="sugg-price">₹${p.price.toLocaleString('en-IN')}</div>
          <div class="sugg-discount">${p.discount}% off</div>
        </div>
      `).join('');
    }

    // ─── REMOVE FROM WISHLIST ───
    function removeFromWishlist(id) {
      wishlist = wishlist.filter(i => i.id !== id);
      localStorage.setItem('bazario_wishlist', JSON.stringify(wishlist));

      // ─────────────────────────────────────────────────────────────
      // Later: CleverTap event — "Removed from Wishlist"
      // clevertap.event.push("Removed from Wishlist", {
      //   product_id: id
      // });
      // ─────────────────────────────────────────────────────────────

      render();
      renderSuggestions();
      showToast('Removed from Wishlist');
    }

    // ─── MOVE TO CART ───
    function moveToCart(id) {
      const item = wishlist.find(i => i.id === id);
      if (!item) return;

      const existing = cartItems.find(i => i.id === id);
      if (existing) {
        existing.qty++;
      } else {
        cartItems.push({ ...item, qty: 1 });
      }

      localStorage.setItem('bazario_cart', JSON.stringify(cartItems));
      updateCartCount();

      // Remove from wishlist
      wishlist = wishlist.filter(i => i.id !== id);
      localStorage.setItem('bazario_wishlist', JSON.stringify(wishlist));

      // ─────────────────────────────────────────────────────────────
      // Later: CleverTap event — "Moved to Cart from Wishlist"
      // clevertap.event.push("Moved to Cart from Wishlist", {
      //   product_id:   item.id,
      //   product_name: item.name,
      //   category:     item.category,
      //   price:        item.price
      // });
      // ─────────────────────────────────────────────────────────────

      render();
      showToast(`✓ ${item.name.substring(0, 28)}... moved to cart`);
    }

    // ─── ADD ALL TO CART ───
    function addAllToCart() {
      wishlist.forEach(item => {
        const existing = cartItems.find(i => i.id === item.id);
        if (existing) existing.qty++;
        else cartItems.push({ ...item, qty: 1 });
      });

      localStorage.setItem('bazario_cart', JSON.stringify(cartItems));
      wishlist = [];
      localStorage.setItem('bazario_wishlist', JSON.stringify(wishlist));
      updateCartCount();
      render();

      // ─────────────────────────────────────────────────────────────
      // Later: CleverTap event — "Add All Wishlist to Cart"
      // clevertap.event.push("Add All Wishlist to Cart", {
      //   item_count: wishlist.length
      // });
      // ─────────────────────────────────────────────────────────────

      showToast('All items moved to cart ✓');
      setTimeout(() => window.location.href = 'cart.html', 1200);
    }

    // ─── CLEAR WISHLIST ───
    function clearWishlist() {
      if (!confirm('Remove all items from your wishlist?')) return;
      wishlist = [];
      localStorage.setItem('bazario_wishlist', JSON.stringify(wishlist));
      render();
      renderSuggestions();
      showToast('Wishlist cleared');
    }

    // ─── SORT ───
    function sortWishlist(type, btn) {
      currentSort = type;
      document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    // ─── NAVIGATE TO PRODUCT ───
    function goToProduct(id, category) {
      window.location.href = `product.html?id=${id}&category=${category}`;
    }

    // ─── SEARCH ───
    function handleSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      window.location.href = `listing.html?search=${encodeURIComponent(q)}`;
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });

    // ─── HELPERS ───
    function updateCartCount() {
      const total = cartItems.reduce((s, i) => s + i.qty, 0);
      document.getElementById('cartCount').textContent = total;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
